<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password · dorm_LINK</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/neumorphism.css">
  <link rel="stylesheet" href="../../css/glassmorphism.css">
  <link rel="stylesheet" href="../../css/forms.css">
  <link rel="stylesheet" href="../../css/animations.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <link rel="stylesheet" href="../../css/responsive.css">
</head>
<body data-page="reset">
  <div class="auth-wrap">
    <div class="auth-brand"><div class="logo">dorm<span class="link">_LINK</span></div><p>Campus Oriented Hostel Manager · USTM</p></div>
    <div class="auth-card glass">
      <h2 style="text-align:center;margin-bottom:6px">Enter OTP &amp; new password</h2>
      <p class="text-soft" style="text-align:center;margin-bottom:18px;font-size:.88rem">
        Code sent to <b id="resetEmailLabel">your email</b>.</p>
      <form id="resetForm" novalidate>
        <div class="field"><label style="text-align:center;display:block">6-digit OTP</label>
          <div class="otp-row">
            <input class="otp-box" inputmode="numeric" maxlength="1">
            <input class="otp-box" inputmode="numeric" maxlength="1">
            <input class="otp-box" inputmode="numeric" maxlength="1">
            <input class="otp-box" inputmode="numeric" maxlength="1">
            <input class="otp-box" inputmode="numeric" maxlength="1">
            <input class="otp-box" inputmode="numeric" maxlength="1">
          </div>
        </div>
        <div class="field"><label>New Password</label>
          <div class="pw-wrap"><input class="input" type="password" name="password" placeholder="min 6 characters"><span class="pw-eye"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></span></div></div>
        <div class="field"><label>Verify Password</label>
          <div class="pw-wrap"><input class="input" type="password" name="confirm" placeholder="re-type password"><span class="pw-eye"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></span></div></div>
        <button class="btn btn-primary chameleon" type="submit" style="width:100%">Update password</button>
      </form>
      <div class="auth-switch"><a href="signin.html">Back to sign in</a></div>
    </div>
  </div>
  <script src="../../js/auth.js"></script>
</body>
</html>
