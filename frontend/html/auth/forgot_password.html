<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password · dorm_LINK</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/neumorphism.css">
  <link rel="stylesheet" href="../../css/glassmorphism.css">
  <link rel="stylesheet" href="../../css/forms.css">
  <link rel="stylesheet" href="../../css/animations.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <link rel="stylesheet" href="../../css/responsive.css">
</head>
<body data-page="forgot">
  <div class="auth-wrap">
    <div class="auth-brand"><div class="logo">dorm<span class="link">_LINK</span></div><p>Campus Oriented Hostel Manager · USTM</p></div>
    <div class="auth-card glass">
      <h2 style="text-align:center;margin-bottom:6px">Reset your password</h2>
      <p class="text-soft" style="text-align:center;margin-bottom:18px;font-size:.88rem">We'll send a one-time code to your registered email.</p>
      <form id="forgotForm" novalidate>
        <div class="field"><label>Account type</label>
          <select class="input" name="role"><option value="STUDENT">Student</option><option value="ADMIN">Admin</option></select></div>
        <div class="field"><label>Registered Email</label>
          <input class="input" type="email" name="email" placeholder="you@ustm.ac.in"></div>
        <button class="btn btn-primary chameleon" type="submit" style="width:100%">Send OTP</button>
      </form>
      <div class="auth-switch">Remembered it? <a href="signin.html">Back to sign in</a></div>
    </div>
  </div>
  <script src="../../js/auth.js"></script>
</body>
</html>
