        <div class="section-head"><h1>Admin Profile</h1></div>

          <div class="grid-2">
            <div class="field"><label>Full Name</label><input class="input" id="p_name" value="System Administrator"></div>

            <div class="field"><label>Email</label><input class="input" id="p_email" value="admin@ustm.ac.in"></div>
            <div class="field"><label>Phone</label><input class="input" id="p_phone" value="+91 98000 00000"></div>

          <button class="btn btn-primary chameleon" onclick="DL.toast('Profile saved','ok')">Save changes</button>
        </div>
        <div class="section-head" style="margin-top:26px"><h1>Update password</h1></div>
        <div class="panel glass" style="max-width:560px">
          <div class="field"><label>Current password</label><input class="input" type="password"></div>
          <div class="grid-2">
            <div class="field"><label>New password</label><input class="input" type="password"></div>
            <div class="field"><label>Confirm</label><input class="input" type="password"></div>
          </div>
          <button class="btn btn-primary chameleon" onclick="DL.toast('Password updated','ok')">Update password</button>
