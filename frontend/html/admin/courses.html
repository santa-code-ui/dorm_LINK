    <div class="main">
      <header class="topbar glass">
        <button class="menu-toggle nm-icon" aria-label="Menu"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>

        <div class="tb-right">
          <div class="who"></div>
          <div class="avatar">U</div>
        </div>
      </header>
      <main class="content cascade">
        <div class="section-head"><h1>Courses</h1>
          <button class="btn btn-primary chameleon" id="addCourseBtn">+ Add course</button></div>
        <div class="panel">
          <div class="table-wrap"><table>
            <thead><tr><th>ID</th><th>Code</th><th>Course Name</th><th>Dept</th><th>Students</th><th></th></tr></thead>
            <tbody id="coursesBody"></tbody>
          </table></div>
        </div>
        <script src="../../js/dashboard.js"></script>
        <script>
        (function(){
          const { $, esc, toast, get, modal } = window.DL;
          const DEMO = [
            {courseId:1,code:"CSE",courseName:"B.Tech Computer Science",dept:"Engineering",students:3},
            {courseId:2,code:"ECE",courseName:"B.Tech Electronics & Comm.",dept:"Engineering",students:1},
            {courseId:3,code:"BBA",courseName:"Bachelor of Business Admin.",dept:"Management",students:1},
            {courseId:4,code:"BSC",courseName:"B.Sc Physics",dept:"Sciences",students:0}
          ];
          const body = $("#coursesBody");
          function render(rows){
            body.innerHTML = rows.map(c=>`<tr><td>${c.courseId}</td><td><b>${esc(c.code)}</b></td>
              <td>${esc(c.courseName)}</td><td>${esc(c.dept)}</td><td>${c.students}</td>
              <td class="tb-right"><button class="btn btn-ghost btn-sm" data-del="${c.courseId}">Delete</button></td></tr>`).join("");
            body.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{ toast("Course removed (preview)",""); b.closest("tr").remove(); });
          }
          get("/students/courses", DEMO).then(render);
          $("#addCourseBtn").onclick=()=>modal("Add course",
            `<div class="field"><label>Code</label><input class="input" id="c_code"></div>
             <div class="field"><label>Course name</label><input class="input" id="c_name"></div>
             <div class="field"><label>Department</label><input class="input" id="c_dept"></div>`,
            ()=>{ toast("Course added (preview)","ok"); });
        })();
        </script>
      </main>
    </div>
