      <main class="content cascade">
        <div class="section-head"><h1>Reports</h1></div>
        <div class="cards" id="reportCards"></div>
        <div class="section-head" style="margin-top:28px"><h1>Hostel occupancy</h1></div>
        <div class="panel" id="occWrap"></div>
        <script>
        (function(){
          const { $, esc, get } = window.DL;
          const stats = {students:5, allocated:4, rooms:10, occupiedBeds:6, totalBeds:22, complaintsOpen:2, feesCollected:189000, feesDue:251000};
          const card=(l,v)=>`<div class="stat nm-well"><div class="stat-val">${v}</div><div class="stat-lbl">${l}</div></div>`;
          $("#reportCards").innerHTML =
            card("Students", stats.students)+card("Allocated", stats.allocated)+
            card("Bed occupancy", Math.round(stats.occupiedBeds/stats.totalBeds*100)+"%")+
            card("Open complaints", stats.complaintsOpen)+
            card("Fees collected", "₹"+stats.feesCollected.toLocaleString("en-IN"))+
            card("Fees due", "₹"+stats.feesDue.toLocaleString("en-IN"));
          const occ=[{h:"Brahmaputra House (A)",p:75},{h:"Kamakhya House (B)",p:50},{h:"Kaziranga House (C)",p:33},{h:"Majuli House (D)",p:40}];
          $("#occWrap").innerHTML = occ.map(o=>`<div class="row-item"><div class="ri-main"><div>
            <div class="ri-title">${esc(o.h)}</div>
            <div class="track" style="width:240px;height:8px;background:#e6eaf3;border-radius:6px;margin-top:8px">
              <div style="width:${o.p}%;height:100%;border-radius:6px;background:var(--cham)"></div></div>
            </div></div><b>${o.p}%</b></div>`).join("");
        })();
        </script>
      </main>
