# ============================================================
#  dorm_LINK — database configuration
#  Loaded by config.DatabaseConfig from the classpath
#  (place this file in WEB-INF/classes/ when deploying)
# ============================================================
db.url=jdbc:mysql://localhost:3306/dorm_link?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
db.user=root
db.password=
db.driver=com.mysql.cj.jdbc.Driver

# Connection pool (simple bounds used by DBConnection)
db.pool.max=10

# App base context path used to build QR / reset links
app.baseUrl=http://localhost:8080/dormlink
